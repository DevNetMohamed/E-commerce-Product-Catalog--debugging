name: Manual Workflow

on:
  workflow_dispatch:

jobs:
  job_1:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Run app
        run: node src/app.js

      - name: Print environment
        run: print %ENV
        shell: perl {0}